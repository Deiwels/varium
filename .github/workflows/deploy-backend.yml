name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: vuriumbook-api
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth (Workload Identity)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build and Push Container
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA ./backend
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "TELNYX_API_KEY=${{ secrets.TELNYX_API_KEY }}" \
            --set-env-vars "TELNYX_FROM=${{ secrets.TELNYX_FROM }}" \
            --set-env-vars "SQUARE_APP_ID=${{ secrets.SQUARE_APP_ID }}" \
            --set-env-vars "SQUARE_APP_SECRET=${{ secrets.SQUARE_APP_SECRET }}" \
            --set-env-vars "PHONE_ENCRYPTION_KEY=${{ secrets.PHONE_ENCRYPTION_KEY }}" \
            --set-env-vars "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
            --set-env-vars "STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --set-env-vars "STRIPE_PRICE_INDIVIDUAL=${{ secrets.STRIPE_PRICE_INDIVIDUAL }}" \
            --set-env-vars "STRIPE_PRICE_SALON=${{ secrets.STRIPE_PRICE_SALON }}" \
            --set-env-vars "STRIPE_PRICE_CUSTOM=${{ secrets.STRIPE_PRICE_CUSTOM }}" \
            --set-env-vars "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            --set-env-vars "APNS_KEY_ID=${{ secrets.APNS_KEY_ID }}" \
            --set-env-vars "APNS_TEAM_ID=${{ secrets.APNS_TEAM_ID }}" \
            --set-env-vars "APNS_KEY_P8=${{ secrets.APNS_KEY_P8 }}" \
            --set-env-vars "APNS_BUNDLE_ID=${{ secrets.APNS_BUNDLE_ID }}" \
            --set-env-vars "APNS_ENVIRONMENT=${{ secrets.APNS_ENVIRONMENT }}" \
            --set-env-vars "APPLE_SHARED_SECRET=${{ secrets.APPLE_SHARED_SECRET }}" \
            --set-env-vars "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            --set-env-vars "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --set-env-vars "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" \
            --set-env-vars "ADMIN_NOTIFY_EMAIL=${{ secrets.ADMIN_NOTIFY_EMAIL }}" \
            --set-env-vars "FRONTEND_URL=https://vurium.com"

      - name: Show URL
        run: |
          echo "Deployed to:"
          gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)'
